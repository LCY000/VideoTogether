<style>
    :host {
        all: initial;
    }

    .container {
        position: absolute;
        left: 20px;
        bottom: 90px;
        top: auto;
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 6px 8px;
        border-radius: 14px;
        background: rgba(24, 24, 28, 0.78);
        -webkit-backdrop-filter: blur(28px) saturate(170%);
        backdrop-filter: blur(28px) saturate(170%);
        border: 1px solid rgba(255, 255, 255, 0.12);
        box-shadow: 0 8px 28px rgba(0, 0, 0, 0.45);
        color: #f1f1f4;
        font-family: ui-rounded, "PingFang TC", "Microsoft JhengHei", "Segoe UI", system-ui, sans-serif;
        font-size: 14px;
        line-height: 1;
        z-index: 2147483647;
        user-select: none;
        opacity: 1;
        transition: opacity 0.35s ease;
    }

    .drag-handle {
        cursor: grab;
        display: flex;
        align-items: center;
        gap: 5px;
        padding: 0 4px;
        color: #9b9ba4;
    }

    .drag-handle:active {
        cursor: grabbing;
    }

    .drag-handle svg {
        display: block;
    }

    #memberCount {
        color: #f1f1f4;
        font-weight: 700;
    }

    .vt-emojis {
        display: flex;
        gap: 2px;
    }

    .vt-emoji {
        width: 28px;
        height: 28px;
        border: 0;
        background: transparent;
        font-size: 17px;
        line-height: 1;
        border-radius: 8px;
        cursor: pointer;
        transition: background-color 0.15s;
    }

    .vt-emoji:hover {
        background: rgba(255, 255, 255, 0.14);
    }

    .container input[type='text'] {
        flex: 0 0 auto;
        border: none;
        height: 30px;
        width: 0px;
        padding: 0;
        box-sizing: border-box;
        transition: width 0.15s linear, padding 0.15s linear;
        background-color: transparent;
        color: #f1f1f4;
        font-size: 14px;
        outline: none;
    }

    .container input[type='text'].expand {
        width: 130px;
        padding: 0 10px;
        background: rgba(255, 255, 255, 0.08);
        border-radius: 999px;
    }

    .container input[type='text']::placeholder {
        color: #9b9ba4;
    }

    .container button {
        height: 30px;
        font-size: 13px;
        border: 0;
        color: #fff;
        border-radius: 999px;
        background: linear-gradient(135deg, #5b8def 0%, #4a78e0 100%);
        cursor: pointer;
        padding: 0 12px;
        transition: filter 0.15s;
    }

    .container button:hover {
        filter: brightness(1.06);
    }

    .container button:disabled,
    .container button:disabled:hover {
        background: rgba(255, 255, 255, 0.12);
        color: #9b9ba4;
        filter: none;
        cursor: default;
    }

    .container #expand-button {
        width: 28px;
        height: 28px;
        padding: 0;
        background: rgba(255, 255, 255, 0.10);
        color: #f1f1f4;
        font-weight: 700;
    }

    .container #close-btn {
        width: 24px;
        height: 24px;
        padding: 0;
        background: rgba(255, 255, 255, 0.08);
        color: #9b9ba4;
        font-size: 12px;
    }

    .container #close-btn:hover {
        background: rgba(224, 105, 122, 0.32);
        color: #fff;
    }
</style>
<div class="container" id="container">
    <div class="drag-handle" id="drag-handle" title="拖動">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
            <circle cx="9" cy="7" r="4"></circle>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
        </svg>
        <span id="memberCount">0</span>
    </div>
    <div class="vt-emojis" id="vt-emojis">
        <button class="vt-emoji" type="button">😆</button>
        <button class="vt-emoji" type="button">😍</button>
        <button class="vt-emoji" type="button">👍</button>
        <button class="vt-emoji" type="button">🎉</button>
        <button class="vt-emoji" type="button">😂</button>
        <button class="vt-emoji" type="button">🔥</button>
    </div>
    <button id="expand-button">&lt;</button>
    <input type="text" placeholder="{$textMessageInput$}" id="text-input" class="expand" />
    <button id="send-button">{$textMessageSend$}</button>
    <button id="close-btn">✕</button>
</div>
